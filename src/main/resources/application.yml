server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./src/main/resources/data/course-registration;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.example.courseregistration: DEBUG
    org.springframework.web: DEBUG
